<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forecast — Atmosfera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Syne+Mono&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-trail" id="cursorTrail"></div>
  <div class="bg-world"><div class="bg-layer bg-layer-1"></div><div class="bg-layer bg-layer-2"></div></div>
  <div class="bg-noise"></div>
  <canvas id="particle-canvas"></canvas>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo"><div class="nav-logo-dot"></div>Atmosfera</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="forecast.html" class="active">Forecast</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
      <div class="hamburger" id="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    </div>
  </nav>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html" onclick="toggleMenu()">Home</a>
    <a href="forecast.html" class="active" onclick="toggleMenu()">Forecast</a>
    <a href="about.html" onclick="toggleMenu()">About</a>
  </div>

  <div class="loading-overlay" id="loadingOverlay"><div class="loader-ring"></div><p class="loader-text">FETCHING FORECAST</p></div>
  <div class="error-toast" id="errorToast"></div>

  <div class="page-wrapper">
    <main>
      <div class="container">
        <section class="forecast-page">

          <div class="page-title-block">
            <span class="page-eyebrow">EXTENDED OUTLOOK</span>
            <h1 class="page-title">5-Day<br/>Forecast</h1>
            <p class="page-sub">Showing forecast for <strong id="forecastCityLabel">Mumbai, IN</strong></p>
          </div>

          <!-- Search -->
          <div class="forecast-search-row">
            <div class="search-box">
              <div class="search-icon"><i class="fas fa-magnifying-glass"></i></div>
              <input type="text" id="forecastSearchInput" class="search-input" placeholder="Search another city..." aria-label="Search city"/>
              <button class="search-btn" onclick="handleForecastSearch()">
                <i class="fas fa-bolt"></i> Search
              </button>
            </div>
          </div>

          <!-- Unit toggle -->
          <div style="margin-bottom:32px;">
            <div class="unit-pill" style="display:inline-flex;">
              <button class="unit-opt active" data-unit="metric"   onclick="toggleUnit('metric')">°C</button>
              <button class="unit-opt"         data-unit="imperial" onclick="toggleUnit('imperial')">°F</button>
            </div>
          </div>

          <!-- Loading -->
          <div class="forecast-loading" id="forecastLoading">
            <div class="loader-ring"></div>
            <p>LOADING FORECAST DATA</p>
          </div>

          <!-- Error -->
          <p id="forecastError" style="display:none;color:rgba(252,165,165,0.9);font-family:var(--font-mono);font-size:0.82rem;padding:20px 0;"></p>

          <!-- 5-day grid -->
          <div class="forecast-grid" id="forecastGrid"></div>

          <!-- Hourly -->
          <span class="section-label">NEXT 24 HOURS</span>
          <div class="hourly-strip" id="hourlyRow"></div>

        </section>
      </div>
    </main>

    <footer>
      <p>ATMOSFERA © 2025 — Powered by OpenWeatherMap</p>
      <div class="footer-links">
        <a href="index.html">Home</a><a href="forecast.html">Forecast</a><a href="about.html">About</a>
      </div>
    </footer>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
